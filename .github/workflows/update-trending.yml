name: Update GitHub Trending

on:
  # 每周一 UTC 00:00 自动运行
  schedule:
    - cron: '0 0 * * 1'
  # 允许手动触发
  workflow_dispatch:

jobs:
  update-trending:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Fetch GitHub Trending
      run: |
        cd frontend
        # 这里需要实现真实的抓取逻辑
        # 可以使用 GitHub API 或第三方服务
        echo "Fetching GitHub Trending..."
    
    - name: Update data file
      run: |
        cd frontend
        npx ts-node scripts/update-github-trending.ts
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add frontend/src/lib/skills-data.ts
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: update GitHub trending for week $(date +%V)"
        git push
